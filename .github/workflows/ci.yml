name: CI - Tests + Build Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Lancer les tests JUnit 5
        run: mvn --batch-mode test
        working-directory: boutique-app

  build-push:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Calculer le nom d'image en minuscules
        id: image
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${OWNER}/boutique" >> "$GITHUB_OUTPUT"

      - name: Connexion a ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: ./boutique-app
          file: ./boutique-app/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

