name: Tests JUnit CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      # 1. Recuperer le code
      - uses: actions/checkout@v6

      # 2. Installer Java 21
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3. Lancer les tests
      - name: Executer les tests JUnit
        run: mvn --batch-mode test
