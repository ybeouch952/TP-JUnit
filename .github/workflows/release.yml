name: Release - Build et Push image de production

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Calculer le nom d'image en minuscules
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extraire le nom du tag
        id: meta
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push avec tag de version
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.TAG }}
            ${{ steps.image.outputs.name }}:latest
